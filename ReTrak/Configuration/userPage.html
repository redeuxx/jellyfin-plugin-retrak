<div id="retrakUserPage" data-role="page" class="page libraryPage userPreferencesPage" data-controller="__plugin/retrakuserjs">
    <div data-role="content">
        <div class="content-primary">
            <div class="verticalSection">
                <div class="sectionTitleContainer sectionTitleContainer-cards">
                    <h2 class="sectionTitle">ReTrak</h2>
                </div>
            </div>

            <form id="retrakUserConfigurationForm">
                <div style="height:0; overflow: hidden;">
                    <input type="text" name="fakeusernameremembered" tabindex="-1" />
                    <input type="password" name="fakepasswordremembered" tabindex="-1" />
                </div>

                <div class="inputContainer">
                    <input is="emby-input" id="txtUserAccessToken" name="txtUserAccessToken" type="text" label="ReTrak API Key:" />
                    <div class="fieldDescription">
                        Enter your personal API key (prefixed with <code>dnt_</code>) from
                        <a href="https://retrak.tv/settings" target="_blank" rel="noopener">ReTrak settings</a>.
                    </div>
                </div>

                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label>
                        <input is="emby-checkbox" type="checkbox" id="chkUserSkipUnwatchedImportFromReTrak" />
                        <span>Skip unwatched import from ReTrak</span>
                    </label>
                </div>
                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label>
                        <input is="emby-checkbox" type="checkbox" id="chkUserPostWatchedHistory" />
                        <span>Update ReTrak watched history during scheduled task</span>
                    </label>
                </div>
                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label>
                        <input is="emby-checkbox" type="checkbox" id="chkUserSyncCollection" />
                        <span>Sync collection during scheduled task</span>
                    </label>
                </div>
                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label>
                        <input is="emby-checkbox" type="checkbox" id="chkUserExtraLogging" />
                        <span>Enable debug logging</span>
                    </label>
                </div>
                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label>
                        <input is="emby-checkbox" type="checkbox" id="chkUserExportMediaInfo" />
                        <span>Export media info</span>
                    </label>
                </div>

                <div>
                    <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                        <span>Save</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
